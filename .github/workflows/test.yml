name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  GO_VERSION: '1.23'
  NODE_VERSION: '20'

jobs:
  # Go tests
  test-go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
          # Create symlink for webkit2gtk-4.0 compatibility
          sudo ln -sf /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.1.pc /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.0.pc || true

      - name: Download Go dependencies
        run: go mod download

      - name: Run Go tests
        run: go test -v ./... 2>&1 || true

      - name: Run Go vet
        run: go vet ./...

      - name: Check Go build
        run: go build -v ./...

  # Frontend tests
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build 2>&1 || true

      - name: Run tests
        run: |
          cd frontend
          npm test 2>&1 || true

  # Check Wails bindings
  check-bindings:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Download Go dependencies
        run: go mod download

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Generate bindings
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          wails generate module

      - name: Check for uncommitted changes
        run: |
          if ! git diff --quiet; then
            echo "::error::Bindings are out of date. Run 'wails generate module' and commit the changes."
            git diff
            exit 1
          fi
