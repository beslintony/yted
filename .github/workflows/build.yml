name: Build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "24"

jobs:
  # Build for Linux
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Download Go dependencies
        run: go mod download

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build Linux AMD64
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          wails build -tags webkit2_41 -platform linux/amd64 -ldflags "-s -w" -o yted

      - name: Bundle FFmpeg
        run: |
          curl -sL -o ffmpeg-linux.tar.xz https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
          tar -xf ffmpeg-linux.tar.xz
          cp ffmpeg-master-latest-linux64-gpl/bin/ffmpeg build/bin/ffmpeg
          cp ffmpeg-master-latest-linux64-gpl/bin/ffprobe build/bin/ffprobe
          chmod +x build/bin/ffmpeg build/bin/ffprobe
          rm -rf ffmpeg-linux.tar.xz ffmpeg-master-latest-linux64-gpl

      - name: Package Linux binary
        run: |
          cd build/bin
          tar czf YTed-linux-amd64.tar.gz yted ffmpeg ffprobe

      - name: Build Linux .deb package
        run: |
          sudo apt-get update && sudo apt-get install -y dpkg-dev
          build/scripts/build-deb.sh

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: YTed-linux-amd64
          path: |
            build/bin/YTed-linux-amd64.tar.gz
            build/bin/*.deb
          if-no-files-found: error

  # Build for Windows
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Download Go dependencies
        run: go mod download

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build Windows AMD64
        run: |
          $env:PATH += ";$(go env GOPATH)\bin;C:\Program Files (x86)\NSIS"
          wails build -platform windows/amd64 -ldflags "-s -w" -nsis -o YTed.exe

      - name: Bundle FFmpeg
        run: |
          New-Item -ItemType Directory -Force -Path "build\bin" | Out-Null
          curl -L -o ffmpeg-windows.zip https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip
          Expand-Archive -Path ffmpeg-windows.zip -DestinationPath ffmpeg-windows
          $dir = Get-ChildItem -Path ffmpeg-windows -Filter "ffmpeg-*-essentials_build" | Select-Object -First 1
          Copy-Item "$($dir.FullName)\bin\ffmpeg.exe" -Destination "build\bin\ffmpeg.exe"
          Copy-Item "$($dir.FullName)\bin\ffprobe.exe" -Destination "build\bin\ffprobe.exe"
          Remove-Item -Recurse -Force ffmpeg-windows.zip, ffmpeg-windows

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: YTed-windows-amd64
          path: build/bin/*.exe
          if-no-files-found: error

  # Create Release (only on tags)
  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
