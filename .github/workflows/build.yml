name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

env:
  GO_VERSION: '1.23'
  NODE_VERSION: '20'

jobs:
  # Build for Linux
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Download Go dependencies
        run: go mod download

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Linux AMD64
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          wails build -platform linux/amd64 -ldflags "-s -w" -o YTed

      - name: Package Linux binary
        run: |
          cd build/bin
          tar czf YTed-linux-amd64.tar.gz YTed

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: YTed-linux-amd64
          path: build/bin/YTed-linux-amd64.tar.gz
          if-no-files-found: error

  # Build for Windows
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Download Go dependencies
        run: go mod download

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Windows AMD64
        run: |
          $env:PATH += ";$(go env GOPATH)\bin"
          wails build -platform windows/amd64 -ldflags "-s -w" -o YTed.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: YTed-windows-amd64
          path: build/bin/*.exe
          if-no-files-found: error

  # Build for macOS
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Download Go dependencies
        run: go mod download

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build macOS AMD64
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          wails build -platform darwin/amd64 -ldflags "-s -w" -o YTed-amd64

      - name: Build macOS ARM64
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          wails build -platform darwin/arm64 -ldflags "-s -w" -o YTed-arm64

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: YTed-macos
          path: build/bin/YTed-*
          if-no-files-found: error

  # Create Release (only on tags)
  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
