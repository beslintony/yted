name: Build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "24"

jobs:
  # Build for Linux
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Download Go dependencies
        run: go mod download

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Set build metadata
        run: |
          VERSION=$(grep '"productVersion"' wails.json | head -1 | sed -E 's/.*"productVersion": "([^"]+)".*/\1/')
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "APP_COMMIT=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          echo "APP_BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Build Linux AMD64
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          wails build -tags webkit2_41 -platform linux/amd64 -ldflags "-s -w -X yted/internal/version.Version=${APP_VERSION} -X yted/internal/version.Commit=${APP_COMMIT} -X yted/internal/version.BuildDate=${APP_BUILD_DATE}" -o yted

      - name: Package Linux binary
        run: |
          cd build/bin
          tar czf YTed-linux-amd64.tar.gz yted

      - name: Build Linux .deb package
        run: |
          sudo apt-get update && sudo apt-get install -y dpkg-dev
          build/scripts/build-deb.sh

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: YTed-linux-amd64
          path: |
            build/bin/YTed-linux-amd64.tar.gz
            build/bin/*.deb
          if-no-files-found: error

  # Build for Windows
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Download Go dependencies
        run: go mod download

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install NSIS
        run: choco install nsis -y

      - name: Set build metadata
        run: |
          $version = (Get-Content wails.json | ConvertFrom-Json).info.productVersion
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $version = $env:GITHUB_REF_NAME.TrimStart("v")
          }
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "APP_COMMIT=$(git rev-parse --short HEAD)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "APP_BUILD_DATE=$([DateTime]::UtcNow.ToString('yyyy-MM-ddTHH:mm:ssZ'))" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Windows AMD64
        run: |
          $env:PATH += ";$(go env GOPATH)\bin;C:\Program Files (x86)\NSIS"
          $ldflags = "-s -w -X yted/internal/version.Version=$env:APP_VERSION -X yted/internal/version.Commit=$env:APP_COMMIT -X yted/internal/version.BuildDate=$env:APP_BUILD_DATE"
          wails build -platform windows/amd64 -ldflags $ldflags -nsis -o YTed.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: YTed-windows-amd64
          path: build/bin/*.exe
          if-no-files-found: error

  # Create Release (only on tags)
  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
