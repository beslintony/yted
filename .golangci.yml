# golangci-lint configuration for YTed
version: "2"

run:
  go: "1.24"

linters:
  enable:
    - errcheck      # Check for unchecked errors
    - gosimple      # Simplify code
    - govet         # Vet examines Go source code
    - ineffassign   # Detect ineffectual assignments
    - staticcheck   # Go static analysis
    - unused        # Check for unused constants, variables, functions
    - gocritic      # Opinionated go linter
    - misspell      # Find commonly misspelled words
    - revive        # Drop-in replacement for golint
    - bodyclose     # Check for unclosed http bodies
    - noctx         # Find functions without context
    - prealloc      # Find slice declarations that could be preallocated
    - unconvert     # Remove unnecessary type conversions
    - unparam       # Report unused function parameters
  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
            - sayRepetitiveInsteadOfStutters
        - name: context-as-argument
        - name: context-keys-type
        - name: error-return
        - name: error-strings
        - name: var-naming
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: error-naming
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
  exclusions:
    generated: lax
    paths:
      - frontend
      - .*_test\.go
    rules:
      # Exclude shadow checking for err variable (common pattern)
      - text: 'shadow: declaration of "err" shadows'
        linters:
          - govet
      # Exclude some linters from running on tests
      - path: _test.go
        linters:
          - gocyclo
          - errcheck
          - dupl
          - gosec
          - lll
      # Exclude know deprecation warnings
      - text: "SA1019"
        linters:
          - staticcheck
      # Exclude stuttering warnings for log package types
      - text: "type name will be used as log.LogEntry"
        linters:
          - revive
      - text: "type name will be used as log.LogLevel"
        linters:
          - revive
      # Exclude SA5011 false positives in tests (nil pointer after check pattern)
      - path: _test.go
        linters:
          - staticcheck
        text: "SA5011"

formatters:
  enable:
    - gofmt         # Check if code is formatted
    - goimports     # Check import formatting
    - gci           # Control import ordering
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - yted
    gci:
      sections:
        - standard
        - default
        - prefix(yted)
  exclusions:
    paths:
      - frontend
      - .*_test\.go

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
