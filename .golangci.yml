version: "2"

run:
  go: "1.24"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
    - revive
    - bodyclose
    - prealloc
    - unconvert
    - unparam
  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
            - sayRepetitiveInsteadOfStutters
        - name: context-as-argument
        - name: context-keys-type
        - name: error-return
        - name: error-strings
        - name: var-naming
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: error-naming
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
  exclusions:
    paths:
      - frontend
      - ".*_test\\.go"
    rules:
      - text: 'shadow: declaration of "err" shadows'
        linters:
          - govet
      - path: _test.go
        linters:
          - gocyclo
          - errcheck
          - dupl
          - gosec
          - lll
      - text: "SA1019"
        linters:
          - staticcheck
      - text: "type name will be used as log.LogEntry"
        linters:
          - revive
      - text: "type name will be used as log.LogLevel"
        linters:
          - revive
      - path: _test.go
        linters:
          - staticcheck
        text: "SA5011"

formatters:
  enable:
    - gofmt
    - goimports
    - gci
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - yted
    gci:
      sections:
        - standard
        - default
        - prefix(yted)
  exclusions:
    paths:
      - frontend
      - ".*_test\\.go"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
