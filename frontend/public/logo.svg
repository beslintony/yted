<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Red square background with rounded corners -->
  <rect width="200" height="200" rx="32" fill="#FF0000"/>
  
  <!-- White circle background for play button area -->
  <circle cx="100" cy="85" r="55" fill="white"/>
  
  <!-- Play button triangle (centered in circle) -->
  <path d="M 80 60 L 130 85 L 80 110 Z" fill="#FF0000"/>
  
  <!-- YTed text below the play button -->
  <text 
    x="100" 
    y="165" 
    text-anchor="middle" 
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" 
    font-size="36" 
    font-weight="800" 
    fill="white"
    style="letter-spacing: -1px;"
  >YTed</text>
</svg>
