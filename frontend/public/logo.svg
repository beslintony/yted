<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Red square background with rounded corners -->
  <rect width="200" height="200" rx="32" fill="#FF0000"/>
  
  <!-- Play button triangle (white, slightly offset for visual balance) -->
  <path d="M 75 55 L 155 100 L 75 145 Z" fill="white"/>
  
  <!-- YTed text overlay (centered on the play button) -->
